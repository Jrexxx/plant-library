<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Library — Berlin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5f0e8;--paper:#faf8f4;--bark:#3d2e1e;--moss:#4a5e3a;
  --sage:#8a9e78;--stone:#8c8880;--rust:#a0522d;--sand:#c8b89a;
  --leaf:#6b8c54;
}
body{background:var(--cream);color:var(--bark);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6}

header{background:var(--bark);color:var(--cream);padding:48px 48px 40px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:rgba(138,158,120,.12)}
header::after{content:'';position:absolute;bottom:-50px;left:220px;width:200px;height:200px;border-radius:50%;background:rgba(200,184,154,.08)}
.header-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-bottom:10px}
header h1{font-family:'Playfair Display',serif;font-size:44px;font-weight:400;line-height:1.15;margin-bottom:18px}
header h1 em{font-style:italic;color:var(--sand)}
.header-meta{font-size:13px;color:var(--stone);display:flex;gap:20px;flex-wrap:wrap}

.controls{position:sticky;top:0;z-index:50;background:var(--cream);border-bottom:1px solid var(--sand);padding:16px 32px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:420px}
.search-wrap input{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--bark);background:var(--paper);border:1px solid var(--sand);border-radius:3px;padding:10px 14px 10px 36px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--moss)}
.search-wrap::before{content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--stone)}
.search-hint{font-size:11px;color:var(--stone);font-style:italic;flex-basis:100%;margin-top:-4px}
.btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--cream);background:var(--moss);border:none;border-radius:3px;padding:10px 18px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn:hover{background:#3a4d2e}
.btn-clear{background:var(--stone)}.btn-clear:hover{background:#6e6a62}
.result-count{font-size:12px;color:var(--stone);white-space:nowrap}

main{max-width:1100px;margin:0 auto;padding:40px 32px 80px}

.group{margin-bottom:48px}.group.hidden{display:none}
.group-header{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--sand);padding-bottom:8px;margin-bottom:22px}
.group-header h2{font-family:'Playfair Display',serif;font-size:26px;font-weight:400}
.group-count{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--moss);line-height:1}

.plant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px}

.card{background:var(--paper);border:1px solid #e0d9cc;border-radius:3px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(61,46,30,.1)}
.card.filtered-out{display:none}
.card.flash{animation:flash 1.4s ease}
@keyframes flash{0%,100%{box-shadow:0 0 0 0 rgba(74,94,58,0)}30%{box-shadow:0 0 0 4px rgba(74,94,58,.45)}}

.hero{width:100%;aspect-ratio:1/1;background:var(--cream);position:relative;overflow:hidden;border-bottom:1px solid #e0d9cc}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:repeating-linear-gradient(135deg,#efe9df,#efe9df 12px,#f2ede3 12px,#f2ede3 24px);color:var(--sand)}
.placeholder svg{width:40px;height:40px;opacity:.55}
.placeholder span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone)}

.card-face{padding:14px 16px 16px}
.plant-id{font-size:9px;font-weight:600;letter-spacing:.18em;color:var(--stone);background:var(--cream);border:1px solid var(--sand);padding:1px 7px;border-radius:2px;display:inline-block;margin-bottom:7px}
.card-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;line-height:1.25;margin-bottom:2px}
.card-latin{font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:var(--stone)}

.detail{display:none;border-top:1px solid #e0d9cc;background:#fbfaf6}
.card.open .detail{display:block}
.card.open{cursor:default}
.detail-inner{padding:14px 16px 16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #e0d9cc;border-radius:2px;overflow:hidden;margin-bottom:10px}
.detail-item{padding:8px 10px;font-size:12px;border-bottom:1px solid #e0d9cc;border-right:1px solid #e0d9cc}
.detail-item:nth-child(even){border-right:none}
.detail-item:nth-last-child(-n+2):nth-child(odd){border-bottom:none}
.detail-item:last-child{border-bottom:none}
.detail-item strong{display:block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--stone);margin-bottom:2px}
.detail-item span{color:var(--bark);line-height:1.4}
.detail-item span.empty{color:var(--sand);font-style:italic}
.note-box{background:#f2f5ee;border:1px solid #c0cc9a;border-left:3px solid var(--leaf);padding:8px 11px;font-size:12px;line-height:1.5;color:#4a4034;margin-bottom:10px}
.note-box strong{display:block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--leaf);margin-bottom:3px}

.gallery-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--stone);margin-bottom:6px}
.gallery{display:flex;flex-direction:column;gap:10px}
.gallery-item{border:1px solid #e0d9cc;border-radius:2px;overflow:hidden;background:var(--cream)}
.gallery-item img{width:100%;display:block;cursor:zoom-in}
.gallery-date{font-size:10px;color:var(--stone);padding:4px 8px;letter-spacing:.04em;border-top:1px solid #e0d9cc;background:var(--paper)}
.gallery-date.undated{font-style:italic;color:var(--sand)}

.no-results{text-align:center;color:var(--stone);font-style:italic;padding:60px 20px;font-size:15px;display:none}
.no-results.show{display:block}
.loading{text-align:center;color:var(--stone);padding:80px 20px;font-size:15px}
.error-box{max-width:620px;margin:40px auto;background:#fdf6f2;border:1px solid #e0b8a8;border-left:4px solid var(--rust);padding:20px 24px;font-size:13px;line-height:1.7;color:#7a3a20}
.error-box code{background:#fff;border:1px solid #e0c8b8;padding:1px 5px;border-radius:2px;font-size:12px}

footer{text-align:center;font-size:12px;color:var(--stone);padding:28px;border-top:1px solid var(--sand)}

.lightbox{position:fixed;inset:0;background:rgba(30,22,14,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:32px;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:100%;max-height:92vh;border-radius:3px;box-shadow:0 12px 48px rgba(0,0,0,.5)}
.lightbox-cap{position:absolute;bottom:18px;left:0;right:0;text-align:center;color:var(--sand);font-size:12px;letter-spacing:.05em}

@media(max-width:520px){
  header{padding:36px 24px 30px}header h1{font-size:34px}
  main{padding:28px 18px 60px}.controls{padding:14px 18px}
}
</style>
</head>
<body>
<header>
  <div class="header-label">Berlin · Friedrichshain</div>
  <h1>Plant <em>Library</em></h1>
  <div class="header-meta">
    <span id="meta-count">—</span><span id="meta-groups"></span><span id="meta-generated"></span>
  </div>
</header>

<div class="controls">
  <div class="search-wrap"><input id="search" type="text" placeholder="Search by name or ID (e.g. Calathea or 57)" autocomplete="off"></div>
  <button class="btn" id="toggle-all">Expand all</button>
  <button class="btn btn-clear" id="clear" style="display:none">Clear</button>
  <span class="result-count" id="result-count"></span>
  <div class="search-hint">Type an ID number to jump straight to a plant · type a name to filter</div>
</div>

<main id="library"><div class="loading">Loading collection…</div></main>
<div class="no-results" id="no-results">No plants match that search.</div>
<footer>Plant Library · Berlin 2026 · <span id="foot-count"></span> plants</footer>
<div class="lightbox" id="lightbox"><img id="lightbox-img" src="" alt=""><div class="lightbox-cap" id="lightbox-cap"></div></div>

<script>
const PLACEHOLDER='<div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22c0-6 0-10 4-13M12 22c0-4 0-7-3-9"/><path d="M16 9c2-2 4-2 5-3-1 3-2 5-5 5M9 13C7 11 5 12 3 11c1 3 3 4 6 3"/></svg><span>No photo yet</span></div>';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate=iso=>{if(!iso)return null;const[y,m,d]=iso.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1];return `${+d} ${mo} ${y}`;};
let DATA=null;

function heroHTML(p){
  if(p.hero) return `<div class="hero"><img src="id-photos/${esc(p.hero)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='${PLACEHOLDER.replace(/'/g,"\\'")}'"></div>`;
  return `<div class="hero">${PLACEHOLDER}</div>`;
}
function galleryHTML(p){
  if(!p.photos||!p.photos.length) return '';
  const items=p.photos.map(ph=>{
    const d=fmtDate(ph.date);
    const dateLine=d?`<div class="gallery-date">${d}</div>`:`<div class="gallery-date undated">date unknown</div>`;
    return `<div class="gallery-item"><img src="photos/${esc(ph.file)}" alt="" loading="lazy" data-full="photos/${esc(ph.file)}" data-cap="#${p.id} · ${d||'date unknown'}">${dateLine}</div>`;
  }).join('');
  return `<div class="gallery-label">Photos (${p.photos.length})</div><div class="gallery">${items}</div>`;
}
function detailHTML(p){
  const e=v=>v?`<span>${esc(v)}</span>`:`<span class="empty">—</span>`;
  let g=`<div class="detail-grid">`+
    `<div class="detail-item"><strong>Acquired</strong>${e(p.acquired)}</div>`+
    `<div class="detail-item"><strong>Repotted</strong>${e(p.repotted)}</div>`+
    `<div class="detail-item"><strong>Pot size</strong>${e(p.pot)}</div>`+
    `<div class="detail-item"><strong>Location</strong><span class="empty">set after move</span></div></div>`;
  if(p.notes) g+=`<div class="note-box"><strong>Care &amp; notes</strong>${esc(p.notes)}</div>`;
  g+=galleryHTML(p);
  return `<div class="detail"><div class="detail-inner">${g}</div></div>`;
}
function cardHTML(p){
  return `<article class="card" data-id="${p.id}" data-name="${esc((p.name+' '+p.latin).toLowerCase())}">`+
    heroHTML(p)+
    `<div class="card-face"><span class="plant-id">#${p.id}</span>`+
    `<div class="card-name">${esc(p.name)}</div><div class="card-latin">${esc(p.latin)}</div></div>`+
    detailHTML(p)+`</article>`;
}
function render(){
  const lib=document.getElementById('library');let html='';
  DATA.groups.forEach(grp=>{
    const cards=grp.ids.map(id=>DATA.plants[id]).filter(Boolean);
    if(!cards.length)return;
    html+=`<section class="group" data-group="${esc(grp.name)}">`+
      `<div class="group-header"><h2>${esc(grp.name)}</h2><span class="group-count">${cards.length}</span></div>`+
      `<div class="plant-grid">${cards.map(cardHTML).join('')}</div></section>`;
  });
  lib.innerHTML=html;
  document.getElementById('meta-count').textContent=DATA.total+' plants';
  document.getElementById('meta-groups').textContent=DATA.groups.length+' groups';
  document.getElementById('meta-generated').textContent=DATA.generated?'updated '+DATA.generated:'';
  document.getElementById('foot-count').textContent=DATA.total;
  wire();
}
function showError(){
  document.getElementById('library').innerHTML=
    `<div class="error-box"><strong>Couldn't load data.json.</strong><br>`+
    `If you opened this file directly from disk, the browser blocks local file reads — this works fine once it's on GitHub Pages. `+
    `To preview locally, run <code>python3 -m http.server</code> in the folder and open <code>http://localhost:8000</code>.<br><br>`+
    `Also confirm <code>data.json</code> exists — generate it with <code>python3 build.py</code>.</div>`;
}

let cards=[],groups=[];
const toggleBtn=document.getElementById('toggle-all');
const search=document.getElementById('search');
const clearBtn=document.getElementById('clear');
const resultCount=document.getElementById('result-count');
const noResults=document.getElementById('no-results');
function visibleCards(){return cards.filter(c=>!c.classList.contains('filtered-out'));}
function syncToggleLabel(){const vis=visibleCards();toggleBtn.textContent=vis.some(c=>!c.classList.contains('open'))?'Expand all':'Collapse all';}
function wire(){
  cards=Array.from(document.querySelectorAll('.card'));
  groups=Array.from(document.querySelectorAll('.group'));
  cards.forEach(card=>card.addEventListener('click',e=>{
    if(e.target.closest('.detail'))return;
    card.classList.toggle('open');syncToggleLabel();
  }));
  document.querySelectorAll('.gallery-item img').forEach(img=>img.addEventListener('click',e=>{
    e.stopPropagation();openLightbox(img.dataset.full,img.dataset.cap);
  }));
  syncToggleLabel();
}
toggleBtn.addEventListener('click',()=>{
  const vis=visibleCards();const anyClosed=vis.some(c=>!c.classList.contains('open'));
  vis.forEach(c=>c.classList.toggle('open',anyClosed));syncToggleLabel();
});
function resetFilter(){
  cards.forEach(c=>c.classList.remove('filtered-out','flash'));
  groups.forEach(g=>g.classList.remove('hidden'));
  noResults.classList.remove('show');resultCount.textContent='';clearBtn.style.display='none';syncToggleLabel();
}
function normalizeId(q){const m=q.replace('#','').trim();if(/^\d{1,3}$/.test(m)){const p=m.padStart(3,'0');if(DATA.plants[p])return p;}return null;}
function jumpToId(id){
  const card=document.querySelector(`.card[data-id="${id}"]`);if(!card)return;
  cards.forEach(c=>c.classList.remove('filtered-out'));groups.forEach(g=>g.classList.remove('hidden'));
  card.classList.add('open');card.scrollIntoView({behavior:'smooth',block:'center'});
  void card.offsetWidth;card.classList.add('flash');
  resultCount.textContent='#'+id;clearBtn.style.display='';noResults.classList.remove('show');
}
function filterByName(q){
  const term=q.toLowerCase();let matches=0;
  cards.forEach(c=>{const hit=c.dataset.name.includes(term);c.classList.toggle('filtered-out',!hit);if(hit)matches++;});
  groups.forEach(g=>{const any=Array.from(g.querySelectorAll('.card')).some(c=>!c.classList.contains('filtered-out'));g.classList.toggle('hidden',!any);});
  noResults.classList.toggle('show',matches===0);
  resultCount.textContent=matches?matches+(matches===1?' match':' matches'):'';clearBtn.style.display='';syncToggleLabel();
}
let debounce;
search.addEventListener('input',()=>{
  clearTimeout(debounce);const q=search.value.trim();
  if(!q){resetFilter();return;}
  debounce=setTimeout(()=>{const id=normalizeId(q);if(id)jumpToId(id);else filterByName(q);},120);
});
search.addEventListener('keydown',e=>{if(e.key==='Enter'){const id=normalizeId(search.value.trim());if(id)jumpToId(id);}});
clearBtn.addEventListener('click',()=>{search.value='';resetFilter();search.focus();});

const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');
const lightboxCap=document.getElementById('lightbox-cap');
function openLightbox(src,cap){lightboxImg.src=src;lightboxCap.textContent=cap||'';lightbox.classList.add('show');}
lightbox.addEventListener('click',()=>lightbox.classList.remove('show'));
document.addEventListener('keydown',e=>{if(e.key==='Escape')lightbox.classList.remove('show');});

fetch('data.json').then(r=>{if(!r.ok)throw 0;return r.json();}).then(d=>{DATA=d;render();}).catch(()=>showError());
</script>
</body>
</html>
